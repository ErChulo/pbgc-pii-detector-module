<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Browser PII Detector</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

<style>
body{font-family:Arial;margin:40px;background:#f5f5f5}
#drop{border:3px dashed #888;padding:40px;text-align:center;background:white}
table{border-collapse:collapse;margin-top:20px;width:100%}
td,th{border:1px solid #ccc;padding:6px}
</style>
</head>

<body>

<h2>PII Detector</h2>

<div id="drop">
Drag & Drop files here
<br><br>
<input type="file" id="fileInput" multiple>
</div>

<table id="results">
<tr>
<th>File</th>
<th>PII Type</th>
<th>Match</th>
</tr>
</table>

<script>

const allowed = [
"txt","md","html","pdf","docx","xlsx","csv","tsv","db"
]

/* ROBUST PII REGEX */

const PII_PATTERNS = {

SSN: /\b(?!000|666|9\d{2})\d{3}[- ]?(?!00)\d{2}[- ]?(?!0000)\d{4}\b/g,

EMAIL: /\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b/g,

PHONE: /\b(?:\+?1[-.\s]*)?\(?[2-9]\d{2}\)?[-.\s]*\d{3}[-.\s]*\d{4}\b/g,

CREDIT_CARD: /\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\b/g,

IPV4: /\b(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d)\b/g,

ZIP: /\b\d{5}(?:-\d{4})?\b/g,

DOB: /\b(0?[1-9]|1[0-2])[\/\-](0?[1-9]|[12]\d|3[01])[\/\-](19|20)\d{2}\b/g,

NAME: /\b[A-Z][a-z]{2,}\s[A-Z][a-z]{2,}\b/g

}

/* ------------------ */

function detectPII(text,file){

for(const [type,regex] of Object.entries(PII_PATTERNS)){

const matches = text.match(regex)

if(matches){

matches.forEach(m=>{
addResult(file,type,m)
})

}

}

}

/* RESULT TABLE */

function addResult(file,type,match){

const row=document.createElement("tr")

row.innerHTML=`
<td>${file}</td>
<td>${type}</td>
<td>${match}</td>
`

document.querySelector("#results").appendChild(row)

}

/* TEXT FILES */

async function readText(file){

return await file.text()

}

/* PDF */

async function readPDF(file){

const buf=await file.arrayBuffer()

const pdf=await pdfjsLib.getDocument({data:buf}).promise

let text=""

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i)
const content=await page.getTextContent()

content.items.forEach(item=>{
text+=item.str+" "
})

}

return text

}

/* DOCX */

async function readDOCX(file){

const buf=await file.arrayBuffer()

const result=await mammoth.extractRawText({arrayBuffer:buf})

return result.value

}

/* XLSX */

async function readXLSX(file){

const buf=await file.arrayBuffer()

const wb=XLSX.read(buf)

let text=""

wb.SheetNames.forEach(name=>{
const sheet=XLSX.utils.sheet_to_csv(wb.Sheets[name])
text+=sheet
})

return text

}

/* SQLITE DB */

async function readDB(file){

const SQL=await initSqlJs({
locateFile:file=>"https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/"+file
})

const buf=await file.arrayBuffer()

const db=new SQL.Database(new Uint8Array(buf))

let text=""

const tables=db.exec("SELECT name FROM sqlite_master WHERE type='table'")

tables[0].values.forEach(t=>{

const rows=db.exec(`SELECT * FROM ${t[0]}`)

if(rows[0]){
rows[0].values.forEach(r=>{
text+=r.join(" ")
})
}

})

return text

}

/* FILE ROUTER */

async function processFile(file){

const ext=file.name.split(".").pop().toLowerCase()

if(!allowed.includes(ext)){
alert("Unsupported file: "+file.name)
return
}

let text=""

if(["txt","md","html","csv","tsv"].includes(ext))
text=await readText(file)

else if(ext==="pdf")
text=await readPDF(file)

else if(ext==="docx")
text=await readDOCX(file)

else if(ext==="xlsx")
text=await readXLSX(file)

else if(ext==="db")
text=await readDB(file)

detectPII(text,file.name)

}

/* BATCH PROCESS */

async function handleFiles(files){

for(const file of files){
await processFile(file)
}

}

/* INPUT */

document.getElementById("fileInput")
.addEventListener("change",e=>{
handleFiles(e.target.files)
})

/* DRAG DROP */

const drop=document.getElementById("drop")

drop.addEventListener("dragover",e=>{
e.preventDefault()
})

drop.addEventListener("drop",e=>{
e.preventDefault()
handleFiles(e.dataTransfer.files)
})

</script>

</body>
</html>
